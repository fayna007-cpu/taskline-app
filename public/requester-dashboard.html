<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>הבקשות שלי – TaskLine</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    .request-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 1rem;
      transition: border-color 0.2s;
    }
    .request-card:hover { border-color: var(--border-light); }
    .request-card.active { border-color: var(--blue); }
    .request-card.done { opacity: 0.6; }

    .request-card-top {
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .position-circle {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      font-weight: 800;
      flex-shrink: 0;
      background: var(--accent-glow);
      color: var(--accent);
      border: 2px solid var(--accent);
    }
    .position-circle.in-progress {
      background: var(--blue-bg);
      color: var(--blue);
      border-color: var(--blue);
    }
    .position-circle.done {
      background: var(--green-bg);
      color: var(--green);
      border-color: var(--green);
    }

    .request-meta { flex: 1; min-width: 0; }
    .request-title {
      font-size: 1rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .request-provider {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 0.15rem;
    }

    .request-card-bottom {
      padding: 0.75rem 1.5rem;
      background: var(--surface2);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="navbar-brand">
    <span class="logo-dot"></span>
    TaskLine
  </div>
  <div class="navbar-actions">
    <span class="navbar-user" id="navUser"></span>
    <a href="/profile.html" class="btn btn-ghost btn-sm">⚙️ הגדרות</a>
    <button class="btn btn-ghost btn-sm" onclick="logout()">יציאה</button>
  </div>
</nav>

<main class="page-wrapper">

  <div class="dash-header">
    <div>
      <h1 class="dash-title">הבקשות שלי</h1>
      <p class="dash-subtitle" id="dashSubtitle">מעקב אחרי כל הבקשות הפעילות והסגורות</p>
    </div>
    <button class="btn btn-ghost" onclick="loadRequests()">↻ רענן</button>
  </div>

  <!-- סטטיסטיקות -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-value" id="statActive">–</div>
      <div class="stat-label">פעילות</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" style="color:var(--blue)" id="statInProgress">–</div>
      <div class="stat-label">בטיפול</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" style="color:var(--green)" id="statDone">–</div>
      <div class="stat-label">טופלו</div>
    </div>
  </div>

  <!-- רשימת בקשות -->
  <div id="requestsList">
    <div class="empty-state">
      <div class="empty-icon">⏳</div>
      <p>טוען בקשות...</p>
    </div>
  </div>

</main>

<script>
  async function init() {
    const res = await fetch('/api/auth/me');
    const data = await res.json();

    if (!data.loggedIn || data.role !== 'requester') {
      window.location.href = '/login.html';
      return;
    }

    document.getElementById('navUser').textContent = `@${data.username}`;
    document.getElementById('dashSubtitle').textContent = `שלום ${data.name} — הנה הבקשות שלך`;

    loadRequests();
    setInterval(loadRequests, 15000);
  }

  async function loadRequests() {
    try {
      const res = await fetch('/api/my-requests');
      if (!res.ok) return;
      const tasks = await res.json();
      renderRequests(tasks);
    } catch(e) {
      console.error(e);
    }
  }

  function renderRequests(tasks) {
    const active = tasks.filter(t => t.status !== 'done');
    const inProgress = tasks.filter(t => t.status === 'in_progress');
    const done = tasks.filter(t => t.status === 'done');

    document.getElementById('statActive').textContent = active.length;
    document.getElementById('statInProgress').textContent = inProgress.length;
    document.getElementById('statDone').textContent = done.length;

    const container = document.getElementById('requestsList');

    if (tasks.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📭</div>
          <p>עדיין לא שלחת בקשות.</p>
          <p style="margin-top:0.5rem">בקש מנותן שירות לשתף איתך את לינק התור שלו.</p>
        </div>`;
      return;
    }

    let html = '';
    const sorted = [...active.sort((a,b) => a.position - b.position), ...done];

    sorted.forEach(task => {
      const isDone = task.status === 'done';
      const isInProgress = task.status === 'in_progress';

      let circleClass = '';
      let circleContent = '';
      if (isDone) { circleClass = 'done'; circleContent = '✓'; }
      else if (isInProgress) { circleClass = 'in-progress'; circleContent = '⚡'; }
      else { circleContent = task.position; }

      html += `
        <div class="request-card ${isInProgress ? 'active' : ''} ${isDone ? 'done' : ''}">
          <div class="request-card-top">
            <div class="position-circle ${circleClass}">${circleContent}</div>
            <div class="request-meta">
              <div class="request-title">${esc(task.title)}</div>
              <div class="request-provider">נותן שירות: ${esc(task.provider_name)}</div>
            </div>
            <span class="badge badge-${task.status}">${formatStatus(task.status)}</span>
          </div>
          <div class="request-card-bottom">
            <div style="font-size:0.88rem; color:var(--text-muted)">
              ${isDone
                ? '<strong style="color:var(--green)">✓ טופל</strong>'
                : isInProgress
                  ? '<strong style="color:var(--blue)">⚡ בטיפול כרגע</strong>'
                  : task.peopleBefore === 0
                    ? '<strong>אתה הבא בתור!</strong>'
                    : `<strong>${task.peopleBefore}</strong> ${task.peopleBefore === 1 ? 'אדם לפניך' : 'אנשים לפניך'}`
              }
            </div>
            <div style="display:flex; gap:1rem; align-items:center; flex-wrap:wrap">
              <span style="font-size:0.82rem; color:var(--text-muted)">נשלח: <strong>${formatDate(task.created_at)}</strong></span>
              ${task.token ? `<a href="/track.html?token=${task.token}" class="btn btn-ghost btn-sm">מעקב ←</a>` : ''}
            </div>
          </div>
        </div>`;
    });

    container.innerHTML = html;
  }

  function formatStatus(s) {
    return { waiting: 'ממתין', in_progress: 'בטיפול', done: 'טופל' }[s] || s;
  }

  function formatDate(str) {
    if (!str) return '–';
    return new Date(str).toLocaleString('he-IL', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
  }

  function esc(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  async function logout() {
    await fetch('/api/auth/logout', { method: 'POST' });
    window.location.href = '/login.html';
  }

  init();
</script>

</body>
</html>
