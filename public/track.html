<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מעקב בקשה – TaskLine</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    .track-hero {
      text-align: center;
      padding: 3rem 2rem 2rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      border-bottom: none;
    }
    .big-number {
      font-size: 6rem;
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .big-number.done-color {
      background: linear-gradient(135deg, var(--green), #4ade80);
      -webkit-background-clip: text;
      background-clip: text;
    }
    .big-number.progress-color {
      background: linear-gradient(135deg, var(--blue), #60a5fa);
      -webkit-background-clip: text;
      background-clip: text;
    }
    .track-number-label {
      font-size: 1rem;
      color: var(--text-muted);
      margin-bottom: 0.25rem;
    }
    .track-status-row {
      margin-top: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
    }
    .people-before {
      margin-top: 0.75rem;
      font-size: 1rem;
      color: var(--text-muted);
    }
    .people-before strong {
      color: var(--text);
      font-size: 1.15rem;
    }
    .track-details {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0 0 var(--radius-lg) var(--radius-lg);
      padding: 1.5rem 2rem;
    }
    .progress-msg {
      background: var(--blue-bg);
      border: 1px solid rgba(59,130,246,0.3);
      border-radius: var(--radius-sm);
      padding: 1rem 1.2rem;
      font-size: 0.95rem;
      color: var(--blue);
      margin-top: 1rem;
      font-weight: 500;
    }
    .done-msg {
      background: var(--green-bg);
      border: 1px solid rgba(34,197,94,0.3);
      border-radius: var(--radius-sm);
      padding: 1rem 1.2rem;
      font-size: 0.95rem;
      color: var(--green);
      margin-top: 1rem;
      font-weight: 500;
    }
    .auto-refresh-note {
      font-size: 0.78rem;
      color: var(--text-dim);
      margin-top: 1rem;
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="navbar-brand">
    <span class="logo-dot"></span>
    TaskLine
  </div>
  <div class="navbar-actions">
    <a href="index.html" class="btn btn-ghost btn-sm">דף הבית</a>
  </div>
</nav>

<main class="page-wrapper" style="max-width:560px">

  <div id="loadingState" class="empty-state" style="padding:4rem 2rem">
    <div class="empty-icon">⏳</div>
    <p>טוען את הבקשה שלך...</p>
  </div>

  <div id="errorState" style="display:none">
    <div class="empty-state" style="padding:4rem 2rem">
      <div class="empty-icon">❌</div>
      <p>הבקשה לא נמצאה. אנא בדוק את לינק המעקב שלך.</p>
      <a href="index.html" class="btn btn-ghost" style="margin-top:1.5rem">דף הבית</a>
    </div>
  </div>

  <div id="trackContent" style="display:none">

    <div style="margin-bottom:1.5rem">
      <div style="font-size:0.85rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:0.25rem">מעקב בקשה אצל</div>
      <div style="font-size:1.25rem; font-weight:700" id="providerDisplay">–</div>
    </div>

    <!-- תצוגת סטטוס מרכזית -->
    <div class="track-hero">
      <div id="mainDisplay"></div>
      <div class="track-status-row">
        <span class="badge" id="statusBadge"></span>
      </div>
      <div class="people-before" id="peopleBeforeText"></div>
      <div id="statusMessage"></div>
      <div class="auto-refresh-note" id="refreshNote">מתרענן אוטומטית כל 15 שניות</div>
    </div>

    <!-- פרטים -->
    <div class="track-details">
      <div class="detail-row">
        <span class="detail-label">השם שלך</span>
        <span class="detail-value" id="detailName">–</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">נושא הבקשה</span>
        <span class="detail-value" id="detailTitle">–</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">נשלח</span>
        <span class="detail-value" id="detailDate">–</span>
      </div>
      <div id="detailDescRow" class="detail-row" style="display:none">
        <span class="detail-label">תיאור</span>
        <span class="detail-value" id="detailDesc" style="max-width:280px; text-align:left">–</span>
      </div>

      <div style="margin-top:1.5rem; display:flex; gap:0.75rem; flex-wrap:wrap">
        <button onclick="copyLink()" class="btn btn-ghost">העתק לינק מעקב</button>
        <button onclick="loadTrack()" class="btn btn-ghost">↻ רענן עכשיו</button>
      </div>
    </div>

  </div>

</main>

<div class="toast-container" id="toastContainer"></div>

<script>
  let token = null;

  async function init() {
    const params = new URLSearchParams(window.location.search);
    token = params.get('token');

    if (!token) {
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('errorState').style.display = 'block';
      return;
    }

    await loadTrack();
    setInterval(loadTrack, 15000);
  }

  async function loadTrack() {
    try {
      const res = await fetch(`/api/track?token=${token}`);

      if (!res.ok) {
        document.getElementById('loadingState').style.display = 'none';
        document.getElementById('errorState').style.display = 'block';
        return;
      }

      const data = await res.json();
      renderTrack(data);

    } catch(e) {
      console.error(e);
    }
  }

  function renderTrack({ task, provider, position, peopleBefore }) {
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('trackContent').style.display = 'block';

    document.getElementById('providerDisplay').textContent = provider.name;
    document.title = `מיקום #${position} – TaskLine`;

    document.getElementById('detailName').textContent = task.requester_name;
    document.getElementById('detailTitle').textContent = task.title;
    document.getElementById('detailDate').textContent = formatDate(task.created_at);

    if (task.description) {
      document.getElementById('detailDescRow').style.display = 'flex';
      document.getElementById('detailDesc').textContent = task.description;
    }

    const mainDisplay = document.getElementById('mainDisplay');
    const statusBadge = document.getElementById('statusBadge');
    const peopleBeforeText = document.getElementById('peopleBeforeText');
    const statusMessage = document.getElementById('statusMessage');
    const refreshNote = document.getElementById('refreshNote');

    statusBadge.className = `badge badge-${task.status}`;
    statusBadge.textContent = formatStatus(task.status);

    if (task.status === 'done') {
      mainDisplay.innerHTML = `<div style="font-size:5rem; line-height:1">✓</div>`;
      peopleBeforeText.innerHTML = '';
      statusMessage.innerHTML = `<div class="done-msg">הבקשה שלך טופלה בהצלחה!</div>`;
      refreshNote.style.display = 'none';

    } else if (task.status === 'in_progress') {
      mainDisplay.innerHTML = `
        <div class="track-number-label">כרגע בטיפול</div>
        <div class="big-number progress-color">⚡</div>
      `;
      peopleBeforeText.innerHTML = '';
      statusMessage.innerHTML = `<div class="progress-msg">הבקשה שלך נמצאת בטיפול עכשיו!</div>`;

    } else {
      mainDisplay.innerHTML = `
        <div class="track-number-label">המיקום שלך בתור</div>
        <div class="big-number">#${position}</div>
      `;

      if (peopleBefore === 0) {
        peopleBeforeText.innerHTML = `<strong>אתה הבא בתור!</strong>`;
      } else {
        peopleBeforeText.innerHTML = `<strong>${peopleBefore}</strong> ${peopleBefore === 1 ? 'אדם לפניך' : 'אנשים לפניך'}`;
      }
      statusMessage.innerHTML = '';
    }
  }

  function formatStatus(s) {
    return { waiting: 'ממתין', in_progress: 'בטיפול', done: 'טופל' }[s] || s;
  }

  function formatDate(str) {
    if (!str) return '–';
    return new Date(str).toLocaleString('he-IL', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
  }

  function copyLink() {
    navigator.clipboard.writeText(window.location.href).then(() => toast('לינק הועתק!', 'success'));
  }

  function toast(msg, type = 'success') {
    const container = document.getElementById('toastContainer');
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.textContent = msg;
    container.appendChild(el);
    setTimeout(() => el.remove(), 3000);
  }

  init();
</script>

</body>
</html>
