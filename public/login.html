<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>כניסה – TaskLine</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body class="auth-page">

<div class="auth-card">
  <div class="auth-logo">
    <h1>TaskLine</h1>
    <p class="tagline">ברוכים השבים</p>
  </div>

  <div id="alertBox"></div>

  <form id="loginForm">
    <div class="form-group">
      <label for="username">שם משתמש</label>
      <input type="text" id="username" placeholder="שם-המשתמש-שלך" required autofocus />
    </div>

    <div class="form-group">
      <label for="password">סיסמה</label>
      <input type="password" id="password" placeholder="••••••••" required />
    </div>

    <button type="submit" class="btn btn-primary btn-full btn-lg" id="submitBtn">
      כניסה
    </button>
  </form>

  <div class="auth-divider">או</div>
  <p style="text-align:center; font-size:0.88rem; color:var(--text-muted)">
    אין לך חשבון? <a href="register.html">צור חשבון</a>
  </p>
</div>

<script>
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const alertBox = document.getElementById('alertBox');
    alertBox.innerHTML = '';
    btn.disabled = true;
    btn.textContent = 'מתחבר...';

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('username').value.trim(),
          password: document.getElementById('password').value
        })
      });
      const data = await res.json();

      if (!res.ok) {
        alertBox.innerHTML = `<div class="alert alert-error">${data.error}</div>`;
        btn.disabled = false;
        btn.textContent = 'כניסה';
        return;
      }

      window.location.href = data.role === 'provider'
        ? '/provider-dashboard.html'
        : '/requester-dashboard.html';

    } catch {
      alertBox.innerHTML = '<div class="alert alert-error">משהו השתבש. נסה שוב.</div>';
      btn.disabled = false;
      btn.textContent = 'כניסה';
    }
  });
</script>

</body>
</html>
